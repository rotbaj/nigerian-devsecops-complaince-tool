name: 🛡️ Nigerian Fintech DevSecOps Pipeline

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  # ──────────────────────────────────────────
  # Stage 1: Secret & NDPA Compliance Scan
  # ──────────────────────────────────────────
  compliance-scan:
    name: 🔍 Compliance & Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Nigerian Fintech Compliance Engine
        run: |
          python compliance_engine/scanner.py . --report reports/scan_report.json
        # Exit code 1 = CRITICAL or HIGH findings → pipeline fails and blocks merge

      - name: Upload Compliance Report
        uses: actions/upload-artifact@v4
        if: always()   # Upload even if scan fails so the team can review
        with:
          name: compliance-report
          path: reports/scan_report.json

  # ──────────────────────────────────────────
  # Stage 2: Container Security Scan (Trivy)
  # ──────────────────────────────────────────
  container-scan:
    name: 🐳 Container Security Scan
    runs-on: ubuntu-latest
    needs: compliance-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t fintech-app:${{ github.sha }} .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "fintech-app:${{ github.sha }}"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true

      - name: Trivy IaC scan (Terraform)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "config"
          scan-ref: "."
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"

  # ──────────────────────────────────────────
  # Stage 3: Unit Tests
  # ──────────────────────────────────────────
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    needs: compliance-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ──────────────────────────────────────────
  # Stage 4: Build Summary
  # ──────────────────────────────────────────
  summary:
    name: 📋 Pipeline Summary
    runs-on: ubuntu-latest
    needs: [compliance-scan, container-scan, test]
    if: always()

    steps:
      - name: Download compliance report
        uses: actions/download-artifact@v4
        with:
          name: compliance-report
          path: reports/

      - name: Print summary
        run: |
          echo "=== Pipeline Summary ===" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat reports/scan_report.json | python3 -c "
          import json, sys
          r = json.load(sys.stdin)
          print(f'| Metric | Value |')
          print(f'|--------|-------|')
          print(f'| Files Scanned | {r[\"files_scanned\"]} |')
          print(f'| Total Findings | {r[\"total_findings\"]} |')
          print(f'| Critical | {r[\"critical\"]} |')
          print(f'| High | {r[\"high\"]} |')
          print(f'| Warnings | {r[\"warning\"]} |')
          print(f'| Status | {\"✅ PASSED\" if r[\"passed\"] else \"❌ FAILED\"} |')
          " >> $GITHUB_STEP_SUMMARY
