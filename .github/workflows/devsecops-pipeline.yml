name: Nigerian Fintech DevSecOps Pipeline

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────
  # Stage 1: Secret & NDPA Compliance Scan
  # ──────────────────────────────────────────
  compliance-scan:
    name: Compliance & Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Nigerian Fintech Compliance Engine
        # tests/ and evaluation_data/ intentionally contain synthetic secrets
        # for testing the scanner itself, so they are excluded here.
        # Exit code 1 = CRITICAL or HIGH findings → pipeline fails and blocks merge
        run: |
          python compliance_engine/scanner.py . --exclude tests,evaluation_data,reports --report reports/scan_report.json

      - name: Upload Compliance Report
        uses: actions/upload-artifact@v4
        if: always()   # Upload even if scan fails so the team can review
        with:
          name: compliance-report
          path: |
            reports/scan_report.json
            reports/scan_history.json

  # ──────────────────────────────────────────
  # Stage 1b: Evaluation Corpus Scan
  # Proves the scanner works: the clean corpus must pass with zero
  # findings, and the vulnerable corpus must be caught (scan must fail).
  # Each scan's results are rendered on the run's Summary page, and the
  # report JSONs are uploaded so they can be viewed in the dashboard
  # (Load Report mode → upload the downloaded file).
  # ──────────────────────────────────────────
  evaluation:
    name: Evaluation Corpus Scan
    runs-on: ubuntu-latest
    needs: compliance-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate evaluation corpus
        # evaluation_data/ is git-ignored (it contains synthetic secrets),
        # so the 200-file corpus is generated fresh on every run.
        run: python generate_eval_data.py

      - name: Scan clean corpus (must pass with zero findings)
        run: |
          python compliance_engine/scanner.py evaluation_data/clean \
            --fail-on-warning --report reports/clean_report.json

      - name: Scan vulnerable corpus (scanner must catch it)
        # Exit code 1 is the CORRECT outcome here: it means the scanner
        # detected the planted issues. The step fails only if the scan PASSES.
        run: |
          if python compliance_engine/scanner.py evaluation_data/vulnerable \
              --report reports/vulnerable_report.json; then
            echo "::error::Vulnerable corpus passed the scan; detection is broken"
            exit 1
          fi
          echo "Vulnerable corpus correctly failed the scan."

      - name: Trivy IaC scan of vulnerable corpus (must be caught)
        # Second detection engine over the same corpus: Trivy should flag the
        # planted Terraform/Docker/K8s misconfigurations (open security
        # groups, wildcard IAM, privileged pods, root users, ...).
        # continue-on-error lets the next step assert on the outcome.
        id: trivy_vulnerable
        uses: aquasecurity/trivy-action@v0.36.0
        continue-on-error: true
        with:
          scan-type: "config"
          scan-ref: "evaluation_data/vulnerable"
          format: "json"
          output: "reports/trivy_vulnerable.json"
          exit-code: "1"
          severity: "CRITICAL,HIGH"

      - name: Verify Trivy caught the planted misconfigurations
        run: |
          if [ "${{ steps.trivy_vulnerable.outcome }}" != "failure" ]; then
            echo "::error::Trivy found no CRITICAL/HIGH misconfigurations in the vulnerable corpus"
            exit 1
          fi
          echo "Trivy correctly flagged the vulnerable corpus."

      - name: Trivy IaC scan of clean corpus (informational)
        # exit-code 0: shown in the log for comparison, never gates. The clean
        # corpus is designed against OUR rules; Trivy has hundreds of extra
        # best-practice checks it may still comment on.
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "config"
          scan-ref: "evaluation_data/clean"
          format: "json"
          output: "reports/trivy_clean.json"
          exit-code: "0"
          severity: "CRITICAL,HIGH"

      - name: Publish scan results to run summary
        if: always()
        run: |
          python3 - <<'EOF' >> $GITHUB_STEP_SUMMARY
          import json, os

          def section(title, path, expect_findings):
              print(f"## {title}")
              if not os.path.exists(path):
                  print("_Report not produced (scan step failed early)._\n")
                  return
              r = json.load(open(path))
              detected = len({f["filename"] for f in r["findings"]})
              ok = (detected == 0) if not expect_findings else (detected == 100)
              print("| Metric | Value |")
              print("|--------|-------|")
              print(f"| Files scanned | {r['files_scanned']} |")
              print(f"| Files with findings | {detected} |")
              print(f"| Total findings | {r['total_findings']} |")
              print(f"| 🔴 Critical / 🟠 High / 🟡 Warning | {r['critical']} / {r['high']} / {r['warning']} |")
              if expect_findings:
                  print(f"| Detection rate | {'PASS' if ok else 'FAIL'}: {detected}/100 vulnerable files caught |")
              else:
                  print(f"| False positives | {'none' if ok else f'{detected} clean files flagged'} |")
              print()

          def trivy_section(title, path, expect_findings):
              print(f"## {title}")
              if not os.path.exists(path):
                  print("_Report not produced (scan step failed early)._\n")
                  return
              r = json.load(open(path))
              counts = {}
              for res in r.get("Results") or []:
                  for m in (res.get("Misconfigurations") or []):
                      counts[m["Severity"]] = counts.get(m["Severity"], 0) + 1
              total = sum(counts.values())
              print("| Metric | Value |")
              print("|--------|-------|")
              print(f"| Misconfigurations found | {total} |")
              print(f"| 🔴 Critical / 🟠 High | {counts.get('CRITICAL', 0)} / {counts.get('HIGH', 0)} |")
              if expect_findings:
                  print(f"| Detection | {'planted misconfigs caught' if total else 'nothing caught'} |")
              else:
                  print(f"| False positives | {'none' if total == 0 else f'{total} flagged'} |")
              print()

          section("Clean corpus (100 files, expected: no findings)",
                  "reports/clean_report.json", expect_findings=False)
          section("Vulnerable corpus (100 files, expected: all caught)",
                  "reports/vulnerable_report.json", expect_findings=True)
          trivy_section("Trivy IaC scan of vulnerable corpus (expected: misconfigs caught)",
                        "reports/trivy_vulnerable.json", expect_findings=True)
          trivy_section("Trivy IaC scan of clean corpus (expected: no misconfigs)",
                        "reports/trivy_clean.json", expect_findings=False)
          print("To inspect either scan in the dashboard: download the "
                "`evaluation-reports` artifact below, unzip it, then run the "
                "dashboard locally and drop the JSON into **Load Report** mode.")
          EOF

      - name: Upload evaluation reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: evaluation-reports
          path: |
            reports/clean_report.json
            reports/vulnerable_report.json
            reports/trivy_clean.json
            reports/trivy_vulnerable.json
            reports/scan_history.json

  # ──────────────────────────────────────────
  # Stage 1c: Publish Results Branch
  # Pushes every run's reports + accumulated scan history to the
  # 'scan-results' branch. The dashboard (local or hosted on Streamlit
  # Cloud) reads that branch, so stakeholders always see the latest CI
  # results without touching the pipeline.
  # ──────────────────────────────────────────
  publish-results:
    name: Publish Results for Dashboard
    runs-on: ubuntu-latest
    needs: [compliance-scan, evaluation, container-scan]
    # Runs even when a scan failed, because failed scans are exactly what the
    # dashboard needs to show. Skipped on PRs (no write access from forks).
    if: ${{ always() && github.event_name != 'pull_request' }}
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all scan reports
        uses: actions/download-artifact@v4
        with:
          path: ci_reports

      - name: Push reports to scan-results branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          mkdir results
          # Carry the accumulated history forward if the branch already exists
          if git fetch origin scan-results 2>/dev/null; then
            git show origin/scan-results:scan_history.json > results/scan_history.json || echo "[]" > results/scan_history.json
          else
            echo "[]" > results/scan_history.json
          fi
          python3 - <<'EOF'
          import glob, json, shutil
          history = json.load(open("results/scan_history.json"))
          seen = {(e["scanned_at"], e["target"]) for e in history}
          for path in sorted(glob.glob("ci_reports/*/scan_history.json")):
              for entry in json.load(open(path)):
                  key = (entry["scanned_at"], entry["target"])
                  if key not in seen:
                      history.append(entry)
                      seen.add(key)
          history.sort(key=lambda e: e["scanned_at"])
          json.dump(history, open("results/scan_history.json", "w"), indent=2)
          for name in ("scan_report.json", "clean_report.json", "vulnerable_report.json",
                       "trivy_image.json", "trivy_clean.json", "trivy_vulnerable.json"):
              for path in glob.glob(f"ci_reports/*/{name}"):
                  shutil.copy(path, f"results/{name}")
          EOF
          cd results
          git init -q -b scan-results
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -q -m "CI scan results for ${GITHUB_SHA}"
          git push -f "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" scan-results

  # ──────────────────────────────────────────
  # Stage 2: Container Security Scan (Trivy)
  # ──────────────────────────────────────────
  container-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    needs: compliance-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t fintech-app:${{ github.sha }} .

      - name: Create reports directory
        # reports/ is git-ignored, and Trivy won't create it for its output file
        run: mkdir -p reports

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "fintech-app:${{ github.sha }}"
          format: "json"
          output: "reports/trivy_image.json"
          exit-code: "1"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          # Documented risk acceptances (see .trivyignore for justifications)
          trivyignores: ".trivyignore"

      - name: Upload image scan report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-image-report
          path: reports/trivy_image.json

      - name: Trivy IaC scan (Terraform)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "config"
          scan-ref: "."
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"

  # ──────────────────────────────────────────
  # Stage 3: Unit Tests
  # ──────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: compliance-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate test fixtures
        # tests/fixtures/ is git-ignored (it contains synthetic secrets),
        # so the fixtures must be generated fresh before running the suite.
        run: python generate_eval_data.py

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ──────────────────────────────────────────
  # Stage 4: Build Summary
  # ──────────────────────────────────────────
  summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [compliance-scan, evaluation, container-scan, test]
    if: always()

    steps:
      - name: Download compliance report
        uses: actions/download-artifact@v4
        with:
          name: compliance-report
          path: reports/

      - name: Print summary
        run: |
          echo "=== Pipeline Summary ===" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat reports/scan_report.json | python3 -c "
          import json, sys
          r = json.load(sys.stdin)
          print(f'| Metric | Value |')
          print(f'|--------|-------|')
          print(f'| Files Scanned | {r[\"files_scanned\"]} |')
          print(f'| Total Findings | {r[\"total_findings\"]} |')
          print(f'| Critical | {r[\"critical\"]} |')
          print(f'| High | {r[\"high\"]} |')
          print(f'| Warnings | {r[\"warning\"]} |')
          print(f'| Status | {\"PASSED\" if r[\"passed\"] else \"FAILED\"} |')
          " >> $GITHUB_STEP_SUMMARY
